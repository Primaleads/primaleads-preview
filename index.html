<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimaLeads</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    :root{
      --bg:#f4f4f5;
      --card:#ffffff;
      --text:#111111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --black:#000000;
      --green:#2ecc71;
      --blue:#3498db;
      --red:#e74c3c;
      --gray:#7f8c8d;
      --shadow:0 10px 25px rgba(0,0,0,0.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app-shell{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      max-width:560px;
      margin:0 auto;
      background:var(--bg);
    }

    .topbar{
      background:#000;
      color:#fff;
      padding:18px 18px 14px;
      text-align:center;
      position:sticky;
      top:0;
      z-index:30;
      box-shadow:0 6px 18px rgba(0,0,0,0.16);
    }

    .topbar img{
      height:42px;
      object-fit:contain;
      display:block;
      margin:0 auto 8px;
    }

    .brand{
      font-size:15px;
      letter-spacing:.08em;
      font-weight:700;
    }

    .content{
      padding:16px;
      padding-bottom:100px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
    }

    .login-card{
      margin-top:20px;
    }

    h1,h2,h3,p{
      margin:0 0 10px;
    }

    .section-title{
      font-size:24px;
      font-weight:800;
      margin-bottom:14px;
    }

    .muted{
      color:var(--muted);
    }

    input, textarea, select{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:14px;
      font-size:16px;
      margin-bottom:10px;
      outline:none;
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:15px 16px;
      font-size:17px;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn:active{
      transform:scale(.98);
    }

    .btn-black{
      background:#000;
      color:#fff;
    }

    .btn-green{
      background:var(--green);
      color:#fff;
    }

    .btn-blue{
      background:var(--blue);
      color:#fff;
    }

    .btn-red{
      background:var(--red);
      color:#fff;
    }

    .btn-gray{
      background:var(--gray);
      color:#fff;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .stat-box{
      background:#fafafa;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }

    .stat-label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .stat-value{
      font-size:24px;
      font-weight:800;
    }

    .rank-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .rank-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 14px;
      background:#fafafa;
      border:1px solid var(--line);
      border-radius:14px;
      font-weight:700;
    }

    .quote-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-top:8px;
    }

    .quote-box{
      border-radius:14px;
      padding:14px;
      color:#fff;
      font-weight:800;
      text-align:center;
    }

    .quote-box small{
      display:block;
      opacity:.9;
      font-weight:600;
      margin-bottom:6px;
    }

    #map{
      height:48vh;
      min-height:360px;
      border-radius:20px;
      overflow:hidden;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .lead-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .lead-card{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      background:#fff;
    }

    .lead-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:8px;
    }

    .lead-meta{
      font-size:14px;
      color:var(--muted);
      margin-bottom:4px;
    }

    .chip-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .chip{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
    }

    .chip.green{background:var(--green)}
    .chip.blue{background:var(--blue)}
    .chip.red{background:var(--red)}
    .chip.gray{background:var(--gray)}
    .chip.black{background:#000}

    .tabs{
      position:fixed;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:100%;
      max-width:560px;
      background:#fff;
      border-top:1px solid var(--line);
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      z-index:40;
      box-shadow:0 -8px 22px rgba(0,0,0,0.06);
    }

    .tab-btn{
      border:none;
      background:#fff;
      padding:14px 10px 18px;
      font-size:14px;
      font-weight:800;
      color:var(--muted);
      cursor:pointer;
    }

    .tab-btn.active{
      color:#000;
    }

    .hidden{
      display:none !important;
    }

    .top-actions{
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    .top-actions .btn{
      margin:0;
    }

    .filter-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      margin-bottom:12px;
    }

    .filter-btn{
      border:none;
      border-radius:12px;
      padding:12px;
      font-size:14px;
      font-weight:800;
      background:#ececec;
      color:#111;
    }

    .filter-btn.active{
      background:#000;
      color:#fff;
    }

    .empty-state{
      text-align:center;
      color:var(--muted);
      padding:24px 10px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <img src="logo.png" alt="PrimaLeads Logo">
      <div class="brand">PRIMALEADS</div>
    </div>

    <div class="content">

      <div id="loginView" class="card login-card">
        <h2 class="section-title">Login</h2>
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Passwort">
        <button class="btn btn-black" onclick="login()">Einloggen</button>
      </div>

      <div id="appView" class="hidden">

        <div id="dashboardTab">
          <div class="card">
            <h2 class="section-title">Rangliste</h2>
            <div class="muted" id="welcomeText">Willkommen</div>
            <div class="top-actions">
              <button class="btn btn-black" onclick="refreshAll()">Aktualisieren</button>
              <button class="btn btn-gray" onclick="logout()">Logout</button>
            </div>
          </div>

          <div class="card">
            <h3>Top 5 Vertriebspartner</h3>
            <div id="rankingList" class="rank-list"></div>
          </div>

          <div class="card">
            <h3>Qualifikationsquote</h3>
            <div class="quote-row">
              <div class="quote-box" style="background:#2ecc71">
                <small>Bestätigt</small>
                <span id="confirmedCount">0</span>
              </div>
              <div class="quote-box" style="background:#f39c12">
                <small>Offen</small>
                <span id="openCount">0</span>
              </div>
              <div class="quote-box" style="background:#e74c3c">
                <small>Abgelehnt</small>
                <span id="rejectedCount">0</span>
              </div>
            </div>
          </div>

          <div class="card">
            <h3>Meine Zahlen</h3>
            <div class="stats-grid">
              <div class="stat-box">
                <div class="stat-label">Meine Leads</div>
                <div class="stat-value" id="myLeadCount">0</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Team Leads</div>
                <div class="stat-value" id="teamLeadCount">0</div>
              </div>
            </div>
          </div>
        </div>

        <div id="leadsTab" class="hidden">
          <div class="card">
            <h2 class="section-title">Meine Leads</h2>
            <p class="muted">Hier sieht jeder Vertriebspartner nur seine aufgenommenen Leads.</p>
          </div>

          <div id="leadList" class="lead-list"></div>
        </div>

        <div id="mapTab" class="hidden">
          <div class="card">
            <h2 class="section-title">Heatmap & Leads</h2>
            <div class="filter-row">
              <button id="filterWp" class="filter-btn active" onclick="setHeatFilter('WP Interesse')">WP</button>
              <button id="filterPv" class="filter-btn" onclick="setHeatFilter('PV Interesse')">PV</button>
              <button id="filterAll" class="filter-btn" onclick="setHeatFilter('all')">Alle</button>
            </div>
            <button class="btn btn-black" onclick="startRoute()">Route starten</button>
          </div>

          <div id="map"></div>

          <div class="card">
            <h3>Lead aufnehmen</h3>
            <input id="street" placeholder="Straße">
            <input id="number" placeholder="Hausnummer">
            <input id="customer_name" placeholder="Kundenname">
            <input id="customer_phone" placeholder="Telefon">
            <textarea id="notes" placeholder="Notizen"></textarea>

            <div class="grid-2">
              <button class="btn btn-green" onclick="saveLead('PV Interesse')">PV Interesse</button>
              <button class="btn btn-blue" onclick="saveLead('WP Interesse')">WP Interesse</button>
              <button class="btn btn-red" onclick="saveLead('Kein Interesse')">Kein Interesse</button>
              <button class="btn btn-gray" onclick="saveLead('Niemand zuhause')">Niemand zuhause</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="bottomTabs" class="tabs hidden">
      <button id="tabBtnDashboard" class="tab-btn active" onclick="showTab('dashboard')">Dashboard</button>
      <button id="tabBtnLeads" class="tab-btn" onclick="showTab('leads')">Leads</button>
      <button id="tabBtnMap" class="tab-btn" onclick="showTab('map')">Heatmap</button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }
  </script>
  <script src="index.js"></script>
</body>
</html>
