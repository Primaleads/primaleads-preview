<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PrimaLeads</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="app-icon.png">
<link rel="icon" href="app-icon.png">

<meta name="theme-color" content="#000000">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.header{
background:#000;
padding:15px;
text-align:center;
}

.logo{
height:40px;
}

.page{
display:none;
padding:15px;
padding-bottom:90px;
}

.active{
display:block;
}

.card{
background:white;
border-radius:12px;
padding:15px;
margin-bottom:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
min-height:80px;
}

button{
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
color:white;
width:100%;
margin-bottom:10px;
}

.black{background:black}
.green{background:#2ecc71}
.blue{background:#3498db}
.red{background:#e74c3c}
.gray{background:#7f8c8d}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:#fafafa;
border-radius:8px;
padding:10px;
text-align:center;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:grid;
grid-template-columns:1fr 1fr 1fr;
border-top:1px solid #ddd;
}

.bottom-nav button{
background:none;
color:black;
padding:15px;
}

#map{
height:50vh;
border-radius:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

</div>


<div id="loginPage" class="page active">

<div class="card">

<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Passwort">

<button class="black" onclick="login()">Login</button>

</div>

</div>



<div id="dashboardPage" class="page">

<div class="card">

<h3>Meine Statistik</h3>

<div class="stats">

<div class="stat">
Meine Leads
<div id="myLeadCount">0</div>
</div>

<div class="stat">
Mein Gebiet
<div id="myArea">-</div>
</div>

</div>

</div>

</div>



<div id="mapPage" class="page">

<div class="card">

<button class="black" onclick="startMap()">Karte starten</button>

</div>

<div id="map"></div>

<div class="card">

<h3>Lead aufnehmen</h3>

<input id="street" placeholder="Straße">
<input id="number" placeholder="Hausnummer">

<input id="customer_name" placeholder="Kundenname">
<input id="customer_phone" placeholder="Telefon">

<textarea id="notes" placeholder="Notizen"></textarea>

<button class="green" onclick="saveLead('PV Interesse')">PV Interesse</button>
<button class="blue" onclick="saveLead('WP Interesse')">WP Interesse</button>
<button class="red" onclick="saveLead('Kein Interesse')">Kein Interesse</button>
<button class="gray" onclick="saveLead('Niemand zuhause')">Niemand zuhause</button>

</div>

</div>



<div id="leadsPage" class="page">

<div class="card">

<h3>Leads</h3>

<input id="search" placeholder="Straße suchen..." oninput="searchLeads()">

<div id="leadList"></div>

</div>

</div>



<div class="bottom-nav">

<button onclick="showPage('dashboardPage')">Dashboard</button>
<button onclick="showPage('mapPage')">Karte</button>
<button onclick="showPage('leadsPage')">Leads</button>

</div>


<script src="index.js"></script>

</body>

</html>
