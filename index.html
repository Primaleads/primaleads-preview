<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PrimaLeads</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.header{
background:black;
color:white;
text-align:center;
padding:15px;
font-weight:bold;
}

.page{
display:none;
padding:15px;
}

.active{
display:block;
}

.card{
background:white;
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

#map{
height:60vh;
border-radius:10px;
}

button{
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
color:white;
width:100%;
margin-bottom:10px;
}

.green{background:#2ecc71}
.blue{background:#3498db}
.red{background:#e74c3c}
.gray{background:#7f8c8d}
.black{background:black}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
border-top:1px solid #ddd;
}

.bottom-nav button{
flex:1;
background:none;
color:black;
font-size:14px;
}

.lead-item{
padding:10px;
border-bottom:1px solid #eee;
}

</style>

</head>


<body>

<div class="header">

PRIMALEADS

</div>


<!-- DASHBOARD -->

<div id="dashboardPage" class="page active">

<div class="card">

<h3>Rangliste</h3>

<div id="ranking"></div>

</div>

<div class="card">

<h3>Qualifikationsquote</h3>

Bestätigt: <span id="confirmed"></span><br>
Offen: <span id="open"></span><br>
Abgelehnt: <span id="rejected"></span>

</div>

</div>


<!-- MAP -->

<div id="mapPage" class="page">

<button class="black" onclick="startMap()">Karte starten</button>

<div id="map"></div>

<input id="street" placeholder="Straße">
<input id="number" placeholder="Hausnummer">

<button class="green" onclick="saveLead('PV Interesse')">PV Interesse</button>
<button class="blue" onclick="saveLead('WP Interesse')">WP Interesse</button>
<button class="red" onclick="saveLead('Kein Interesse')">Kein Interesse</button>
<button class="gray" onclick="saveLead('Niemand zuhause')">Niemand zuhause</button>

</div>


<!-- LEADS -->

<div id="leadsPage" class="page">

<input id="search" placeholder="Leads suchen..." oninput="searchLeads()">

<div id="leadList"></div>

</div>


<!-- NAV -->

<div class="bottom-nav">

<button onclick="showPage('dashboardPage')">Dashboard</button>
<button onclick="showPage('mapPage')">Karte</button>
<button onclick="showPage('leadsPage')">Leads</button>

</div>

<script src="index.js"></script>

</body>

</html>
