<!DOCTYPE html>
<html>

<h2>PrimaLeads Dashboard</h2>

Gesamt Leads: <span id="totalLeads">0</span><br>
PV Interesse: <span id="pvLeads">0</span><br>
WP Interesse: <span id="wpLeads">0</span><br>
Kein Interesse: <span id="keinLeads">0</span><br>
Niemand zuhause: <span id="zuhauseLeads">0</span>
<head>

<meta charset="UTF-8">
<title>PrimaLeads App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
  font-family: Arial;
  padding:20px;
}

#login{
  margin-bottom:30px;
}

#map{
  height:400px;
  margin-bottom:20px;
}

button{
  margin:5px;
  padding:10px;
}

</style>

</head>

<body>

<div id="login">

<h1>PRIMALEADS</h1>

<input id="email" placeholder="Email"><br><br>

<input id="password" type="password" placeholder="Passwort"><br><br>

<button onclick="login()">Login</button>

</div>

<h1>PrimaLeads Route</h1>

<button onclick="startRoute()">Route starten</button>

<div id="map"></div>

<h2>Haus erfassen</h2>

<input id="street" placeholder="Straße"><br><br>

<input id="number" placeholder="Hausnummer"><br><br>

Status:<br><br>

<button onclick="saveLead('PV Interesse')">PV Interesse</button>

<button onclick="saveLead('WP Interesse')">WP Interesse</button>

<button onclick="saveLead('Kein Interesse')">Kein Interesse</button>

<button onclick="saveLead('Niemand zuhause')">Niemand zuhause</button>

<script src="index.js"></script>

</body>

</html>
