<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PrimaLeads</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#000;
color:white;
padding:15px;
text-align:center;
}

.logo{
height:40px;
margin-bottom:5px;
}

.container{
padding:15px;
}

#map{
height:50vh;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
padding:15px;
border:none;
border-radius:10px;
font-weight:bold;
font-size:16px;
color:white;
}

.pv{
background:#2ecc71;
}

.wp{
background:#3498db;
}

.no{
background:#e74c3c;
}

.none{
background:#7f8c8d;
}

.start{
background:#000;
width:100%;
margin-bottom:10px;
}

</style>

</head>


<body>

<div class="header">

<img src="logo.png" class="logo">

<div>PRIMALEADS</div>

</div>


<div class="container">

<button class="start" onclick="startRoute()">Route starten</button>

<div id="map"></div>

<h3>Haus erfassen</h3>

<input id="street" placeholder="Straße">
<input id="number" placeholder="Hausnummer">

<div class="buttons">

<button class="pv" onclick="saveLead('PV Interesse')">PV Interesse</button>

<button class="wp" onclick="saveLead('WP Interesse')">WP Interesse</button>

<button class="no" onclick="saveLead('Kein Interesse')">Kein Interesse</button>

<button class="none" onclick="saveLead('Niemand zuhause')">Niemand zuhause</button>

</div>

</div>

<script src="index.js"></script>

</body>

</html>
